<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="180" viewBox="0 0 1200 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0B2C66"/>
      <stop offset="1" stop-color="#0E4AA8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#3EA6FF" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#79C3FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#3EA6FF" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="180" rx="18" fill="url(#bg)"/>

  <!-- soft glow -->
  <ellipse cx="705" cy="32" rx="250" ry="52" fill="#4BB4FF" fill-opacity="0.12"/>
  <ellipse cx="300" cy="158" rx="210" ry="40" fill="#0F6FFF" fill-opacity="0.08"/>

  <!-- subtle circuits on right -->
  <g opacity="0.15" stroke="#89D0FF" stroke-width="1.5">
    <path d="M770 40H1100" />
    <path d="M835 62H1160" />
    <path d="M790 84H1128" />
    <path d="M842 106H1170" />
    <path d="M802 128H1135" />
    <path d="M930 28V58H978" />
    <path d="M1010 54V88H1056" />
    <path d="M968 80V114H1014" />
    <path d="M1060 40V74H1104" />
    <path d="M1098 96V132H1142" />
  </g>

  <!-- nodes -->
  <g filter="url(#glow)">
    <circle cx="889" cy="62" r="3.8" fill="#9AD8FF"/>
    <circle cx="978" cy="58" r="3.2" fill="#7EC8FF"/>
    <circle cx="1056" cy="88" r="3.4" fill="#9AD8FF"/>
    <circle cx="1014" cy="114" r="3.2" fill="#7EC8FF"/>
    <circle cx="1104" cy="74" r="3.3" fill="#9AD8FF"/>
    <circle cx="1142" cy="132" r="3.5" fill="#9AD8FF"/>
  </g>

  <!-- abstract stack icon -->
  <g filter="url(#glow)">
    <path d="M956 104L1030 70L1104 104L1030 138L956 104Z" fill="#E6F5FF" fill-opacity="0.9"/>
    <path d="M972 88L1030 60L1088 88L1030 116L972 88Z" fill="#BDE6FF" fill-opacity="0.95"/>
    <path d="M988 72L1030 52L1072 72L1030 92L988 72Z" fill="#FFFFFF"/>
  </g>

  <!-- accent line -->
  <rect x="86" y="92" width="520" height="2.2" rx="1.1" fill="url(#line)"/>
  <circle cx="334" cy="93.1" r="3.8" fill="#8DD1FF" filter="url(#glow)"/>

  <!-- text -->
  <g fill="#F3F8FF" font-family="Segoe UI, Arial, sans-serif">
    <text x="86" y="72" font-size="20" font-weight="600" letter-spacing="0.35">Application Support • Linux • Infrastructure</text>
    <text x="86" y="128" font-size="13" font-weight="400" fill="#CFE5FF" opacity="0.9">DevOps tools • SQL • Monitoring • Security Operations</text>
  </g>
</svg>
