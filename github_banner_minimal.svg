<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0B2C66"/>
      <stop offset="1" stop-color="#0E4AA8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#3EA6FF" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#79C3FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#3EA6FF" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="240" rx="20" fill="url(#bg)"/>

  <!-- soft top glow -->
  <ellipse cx="710" cy="42" rx="260" ry="70" fill="#4BB4FF" fill-opacity="0.14"/>
  <ellipse cx="320" cy="210" rx="220" ry="55" fill="#0F6FFF" fill-opacity="0.10"/>

  <!-- subtle grid / circuit -->
  <g opacity="0.16" stroke="#89D0FF" stroke-width="1.6">
    <path d="M745 54H1095" />
    <path d="M825 82H1158" />
    <path d="M768 110H1124" />
    <path d="M820 138H1170" />
    <path d="M774 166H1115" />
    <path d="M846 194H1160" />
    <path d="M965 38V78H1014" />
    <path d="M1052 76V118H1098" />
    <path d="M934 104V146H981" />
    <path d="M1008 132V174H1056" />
    <path d="M1104 58V100H1146" />
    <path d="M1084 154V196H1130" />
  </g>

  <!-- nodes -->
  <g filter="url(#glow)">
    <circle cx="889" cy="82" r="4.6" fill="#9AD8FF"/>
    <circle cx="1014" cy="78" r="3.8" fill="#7EC8FF"/>
    <circle cx="1098" cy="118" r="4.2" fill="#9AD8FF"/>
    <circle cx="981" cy="146" r="3.8" fill="#7EC8FF"/>
    <circle cx="1056" cy="174" r="4.1" fill="#9AD8FF"/>
    <circle cx="1146" cy="100" r="3.9" fill="#7EC8FF"/>
    <circle cx="1130" cy="196" r="4.2" fill="#9AD8FF"/>
  </g>

  <!-- central accent line -->
  <rect x="84" y="118" width="540" height="2.4" rx="1.2" fill="url(#line)"/>
  <circle cx="354" cy="119.2" r="4.3" fill="#8DD1FF" filter="url(#glow)"/>

  <!-- understated title -->
  <g fill="#F3F8FF" font-family="Segoe UI, Arial, sans-serif">
    <text x="86" y="94" font-size="18" font-weight="600" letter-spacing="0.4">Application Support • Infrastructure • InfoSec</text>
    <text x="86" y="156" font-size="13" font-weight="400" fill="#CFE5FF" opacity="0.88">Linux • SQL / PostgreSQL • Monitoring • Security-aware operations</text>
  </g>
</svg>
